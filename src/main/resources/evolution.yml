#They are applied when the counter reaches EXACTLY the value of blocks.
milestones:
  milestone-1:
    blocks: 100
    enchantment: EFFICIENCY
    level: 1
  milestone-2:
    blocks: 500
    enchantment: DURABILITY
    level: 1
  milestone-3:
    blocks: 1000
    unlock-special: true

